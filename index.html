<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KAZOTH | Official</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;900&display=swap" rel="stylesheet">
</head>
<body>

    <header class="main-header">
        <div class="header-inner">
            <h1>KAZOTH</h1>
            <div class="separator"></div>
            <p class="subtitle">DJ & PRODUCER</p>
        </div>
    </header>

    <main class="container">
        <section class="media-unit">
            <h2 class="label">YouTube</h2>
            <div class="media-wrapper video-ratio">
                <iframe 
                    src="https://www.youtube.com/embed/8PG440tkycY" 
                    title="KAZOTH Official Video" 
                    frameborder="0" 
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
                    allowfullscreen>
                </iframe>
            </div>
        </section>

        <section class="media-unit">
            <h2 class="label">Mes Mix</h2>
            <div class="media-wrapper">
                <iframe 
                    src="https://app.hearthis.at/kazoth/embed/?hcolor=00f2ff&css=&skin=black" 
                    width="100%" 
                    height="350" 
                    frameborder="0" 
                    scrolling="no">
                </iframe>
            </div>
        </section>

        <nav class="links-grid">
            <a href="https://hearthis.at/kazoth" target="_blank" class="link-card">
                <span class="link-label">HEARTHIS.AT</span>
                <i class="fas fa-arrow-right"></i>
            </a>
            <a href="https://audio.com/kazoth" target="_blank" class="link-card">
                <span class="link-label">AUDIO.COM</span>
                <i class="fas fa-arrow-right"></i>
            </a>
            <a href="https://kazoth.bandcamp.com" target="_blank" class="link-card">
                <span class="link-label">BANDCAMP</span>
                <i class="fas fa-arrow-right"></i>
            </a>
            <a href="https://www.youtube.com/@The.kAzOth" target="_blank" class="link-card">
                <span class="link-label">YOUTUBE</span>
                <i class="fas fa-arrow-right"></i>
            </a>
        </nav>
    </main>

    <footer class="main-footer">
        <p>Contact & Booking</p>
        <a href="mailto:the.kAzOth@gmail.com" class="mail-link">the.kAzOth@gmail.com</a>
    </footer>

</body>
</html>
