<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KAZOTH | OFFICIAL</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@900&display=swap" rel="stylesheet">
</head>
<body>

    <header class="masthead">
        <div class="identity">
            <h1>KAZOTH</h1>
            <p class="tagline">DJ & PRODUCER</p>
        </div>
    </header>

    <main class="content-wrapper">
        
        <section class="module">
            <h2 class="module-label">Transmission</h2>
            <div class="video-frame">
                <iframe 
                    src="https://www.youtube.com/embed/8PG440tkycY" 
                    frameborder="0" 
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                    allowfullscreen>
                </iframe>
            </div>
        </section>

        <section class="module">
            <h2 class="module-label">Audio Archive</h2>
            <div class="audio-frame">
                <iframe 
                    src="https://app.hearthis.at/kazoth/embed/?hcolor=00f2ff&css=&skin=black" 
                    width="100%" 
                    height="350" 
                    frameborder="0" 
                    scrolling="no">
                </iframe>
            </div>
        </section>

        <nav class="matrix-grid">
            <a href="https://kazoth.bandcamp.com" target="_blank" class="matrix-item">
                <i class="fab fa-bandcamp"></i>
                <span>BANDCAMP</span>
            </a>
            <a href="https://www.youtube.com/@The.kAzOth" target="_blank" class="matrix-item">
                <i class="fab fa-youtube"></i>
                <span>YOUTUBE</span>
            </a>
            <a href="https://hearthis.at/kazoth" target="_blank" class="matrix-item">
                <i class="fas fa-headphones"></i>
                <span>HEARTHIS.AT</span>
            </a>
            <a href="https://audio.com/kazoth" target="_blank" class="matrix-item">
                <i class="fas fa-compact-disc"></i>
                <span>AUDIO.COM</span>
            </a>
            <a href="https://www.facebook.com/kAzOth.aka.Psykomars" target="_blank" class="matrix-item full-width">
                <i class="fab fa-facebook"></i>
                <span>FACEBOOK</span>
            </a>
        </nav>

    </main>

    <footer class="terminal-footer">
        <div class="contact-info">
            <span class="label">Contact</span>
            <a href="mailto:the.kAzOth@gmail.com">the.kAzOth@gmail.com</a>
        </div>
    </footer>

</body>
</html>
